<!DOCTYPE html>
<html>
<head>
<title>Catatan Pengeluaran</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#eee;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
max-width:350px;
margin:auto;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:green;
color:white;
border:0;
border-radius:8px;
}

#catatan{
margin-top:20px;
line-height:1.8;
}
</style>
</head>

<body>

<div class="box">

<h2>📒 Buku Pengeluaran</h2>

<select id="bulan">
<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>
</select>

<input id="nama" placeholder="Nama pengeluaran">

<input id="uang" placeholder="Jumlah (contoh 10.000)">

<button onclick="tambah()">Tambah Catatan</button>

<div id="catatan">
Belum ada catatan
</div>

<h3 id="total">Total: Rp0</h3>

</div>


<script>

let semua = {};

function tambah(){

let bulan = document.getElementById("bulan").value;
let nama = document.getElementById("nama").value;

let uang = Number(
document.getElementById("uang").value.replace(/\./g,"")
);


if(nama=="" || uang==0){
alert("Isi data dulu");
return;
}


if(!semua[bulan]){
semua[bulan]=[];
}


semua[bulan].push({
nama:nama,
uang:uang
});


tampil();

document.getElementById("nama").value="";
document.getElementById("uang").value="";

}


function tampil(){

let bulan=document.getElementById("bulan").value;

let teks="";
let jumlah=0;


if(semua[bulan]){

semua[bulan].forEach(function(x){

teks += "• "+x.nama+
" Rp"+x.uang.toLocaleString("id-ID")+"<br>";

jumlah += x.uang;

});

}else{

teks="Belum ada catatan";

}


document.getElementById("catatan").innerHTML=teks;

document.getElementById("total").innerHTML=
"Total "+bulan+": Rp"+jumlah.toLocaleString("id-ID");

}

</script>

</body>
</html>
